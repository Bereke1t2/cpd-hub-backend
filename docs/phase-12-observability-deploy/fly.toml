# Template for Phase 12 — copy to: ./fly.toml (Fly.io). Keep this OR render.yaml, not both.
# Setup:
#   fly launch --no-deploy
#   fly postgres create && fly postgres attach <db>     # sets DATABASE_URL secret
#   fly secrets set JWT_SECRET=$(openssl rand -hex 32) APP_ENV=production
#   fly deploy

app = "cpd-hub-backend"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_ADDR = ":8080"
  APP_ENV = "production"
  # CORS_ORIGINS set via `fly secrets` or here once the web origin is known

# Run migrations before the new version takes traffic.
[deploy]
  release_command = "/app/server-migrate up"   # or a dedicated migrate binary baked into the image

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
