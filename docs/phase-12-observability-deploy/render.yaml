# Template for Phase 12 — copy to: ./render.yaml (Render). Keep this OR fly.toml, not both.
# Render reads this Blueprint to provision the web service + managed Postgres.

services:
  - type: web
    name: cpd-hub-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    # Apply migrations before the new deploy serves traffic.
    preDeployCommand: "/app/server-migrate up"
    envVars:
      - key: APP_ENV
        value: production
      - key: SERVER_ADDR
        value: ":8080"
      - key: JWT_SECRET
        generateValue: true        # Render generates and stores a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: cpd-hub-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false                # set in the dashboard to the web origin

databases:
  - name: cpd-hub-db
    plan: free
    postgresMajorVersion: "16"
